# Copy to ~/.3surgeons/config.yaml or .3surgeons.yaml in project root
surgeons:
  # Atlas (Head Surgeon) is the Claude session itself — no config needed.
  cardiologist:
    role: "External perspective — cross-examination, evidence"
    provider: openai
    endpoint: https://api.openai.com/v1
    model: gpt-4.1-mini
    api_key_env: OPENAI_API_KEY
  neurologist:
    role: "Local intelligence — pattern recognition, corrigibility"
    provider: ollama
    endpoint: http://localhost:11434/v1
    model: qwen3:4b

budgets:
  daily_external_usd: 5.0
  autonomous_ab_usd: 2.0

evidence:
  db_path: ~/.3surgeons/evidence.db
