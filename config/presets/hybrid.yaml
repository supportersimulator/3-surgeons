# 3-Surgeons: Hybrid Mode (Recommended)
# Cardiologist uses DeepSeek API (cheaper, ~10x lower cost than OpenAI),
# Neurologist uses any local LLM ($0). Free-Claude-Code-aligned default.
# Required: Context_DNA_Deepseek env var + local LLM server running (Ollama, MLX, LM Studio, vLLM)
# Run '3s init' to auto-detect your local backend.
# WaveR 2026-05-12: flipped cardio openai→deepseek per Aaron's "free CC" intent.
surgeons:
  cardiologist:
    role: "External perspective — cross-examination, evidence"
    provider: deepseek
    endpoint: https://api.deepseek.com/v1
    model: deepseek-chat
    api_key_env: Context_DNA_Deepseek
  neurologist:
    role: "Local intelligence — pattern recognition, corrigibility"
    provider: ollama
    endpoint: http://localhost:11434/v1
    model: qwen3:4b

state:
  backend: sqlite
  sqlite_path: ~/.3surgeons/state.db

budgets:
  daily_external_usd: 5.0

evidence:
  db_path: ~/.3surgeons/evidence.db
