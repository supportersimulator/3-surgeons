# 3-Surgeons: Hybrid Mode (Recommended)
# Cardiologist uses OpenAI API, Neurologist uses local Ollama.
# Required: OPENAI_API_KEY env var + Ollama with qwen3:4b
surgeons:
  cardiologist:
    role: "External perspective — cross-examination, evidence"
    provider: openai
    endpoint: https://api.openai.com/v1
    model: gpt-4.1-mini
    api_key_env: OPENAI_API_KEY
  neurologist:
    role: "Local intelligence — pattern recognition, corrigibility"
    provider: ollama
    endpoint: http://localhost:11434/v1
    model: qwen3:4b

state:
  backend: sqlite
  sqlite_path: ~/.3surgeons/state.db

budgets:
  daily_external_usd: 5.0

evidence:
  db_path: ~/.3surgeons/evidence.db
