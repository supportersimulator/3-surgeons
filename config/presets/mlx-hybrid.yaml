# 3-Surgeons: MLX Hybrid Mode
# Cardiologist uses OpenAI API, Neurologist uses local MLX server.
# Required: Context_DNA_OPENAI env var + mlx_lm.server running on port 5044
surgeons:
  cardiologist:
    role: "External perspective — cross-examination, evidence"
    provider: openai
    endpoint: https://api.openai.com/v1
    model: gpt-4.1-mini
    api_key_env: Context_DNA_OPENAI
  neurologist:
    role: "Local intelligence — pattern recognition, corrigibility"
    provider: mlx
    endpoint: http://127.0.0.1:5044/v1
    model: mlx-community/Qwen3-4B-4bit

state:
  backend: sqlite
  sqlite_path: ~/.3surgeons/state.db

budgets:
  daily_external_usd: 5.0

evidence:
  db_path: ~/.3surgeons/evidence.db
