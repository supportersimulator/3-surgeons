name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.12']
        include:
          - python-version: '3.9'
            expected-fail: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[test]"
      - name: Lint (non-blocking)
        run: pip install ruff && ruff check . || true
      - name: Run unit tests
        run: pytest -m "not integration" --timeout=30 -v
      - name: Doctor contract (JSON schema)
        run: |
          OUTPUT=$(python -m three_surgeons.cli.main doctor --json 2>/dev/null || true)
          echo "$OUTPUT" | python -c "
          import sys, json
          data = json.load(sys.stdin)
          assert 'checks' in data, 'missing checks key'
          assert 'all_passed' in data, 'missing all_passed key'
          for c in data['checks']:
              assert c['code'].startswith('3S-'), f'bad code: {c[\"code\"]}'
          print('Doctor contract: OK')
          "
      - name: Launcher smoke test
        run: bash tests/test_launcher.sh
    continue-on-error: ${{ matrix.expected-fail == true }}

  test-39-expected-fail:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Verify Python 3.9 fails gracefully
        run: |
          # Package requires >=3.10, so install deps manually and add to path
          pip install click httpx pydantic pyyaml pytest 2>/dev/null || true
          export PYTHONPATH="$PWD"
          # Doctor should report 3S-PY-OLD
          OUTPUT=$(python -m three_surgeons.cli.main doctor --json 2>/dev/null || echo '{}')
          echo "$OUTPUT"
          echo "$OUTPUT" | python -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              codes = [c['code'] for c in data.get('checks', [])]
              if '3S-PY-OLD' in codes:
                  print('Python 3.9 correctly reports 3S-PY-OLD')
              else:
                  print(f'Doctor ran but no 3S-PY-OLD (got {codes}) — acceptable on 3.9')
          except (json.JSONDecodeError, KeyError, ValueError):
              print('Doctor unavailable on 3.9 — acceptable')
          "

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build package
        run: |
          pip install build
          python -m build
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
