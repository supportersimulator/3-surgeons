<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>
  <!-- Three surgeon circles -->
  <circle cx="64" cy="36" r="14" fill="none" stroke="#e94560" stroke-width="2.5"/>
  <circle cx="38" cy="82" r="14" fill="none" stroke="#0f3460" stroke-width="2.5"/>
  <circle cx="90" cy="82" r="14" fill="none" stroke="#533483" stroke-width="2.5"/>
  <!-- Cross-examination lines connecting them -->
  <line x1="54" y1="48" x2="44" y2="70" stroke="#e94560" stroke-width="1.5" opacity="0.6"/>
  <line x1="74" y1="48" x2="84" y2="70" stroke="#e94560" stroke-width="1.5" opacity="0.6"/>
  <line x1="52" y1="82" x2="76" y2="82" stroke="#533483" stroke-width="1.5" opacity="0.6"/>
  <!-- Scalpel symbols inside circles -->
  <text x="64" y="41" text-anchor="middle" font-size="16" fill="#e94560" font-family="sans-serif">A</text>
  <text x="38" y="87" text-anchor="middle" font-size="16" fill="#0f3460" font-family="sans-serif">C</text>
  <text x="90" y="87" text-anchor="middle" font-size="16" fill="#533483" font-family="sans-serif">N</text>
  <!-- 3S label -->
  <text x="64" y="118" text-anchor="middle" font-size="11" fill="#aaa" font-family="sans-serif" font-weight="bold">3-SURGEONS</text>
</svg>
